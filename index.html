<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NutriCycle AI</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<h1 class="title">NutriCycle AI</h1>
<p class="sub">Smart Food Redistribution System</p>

<div id="roleSelection">
<button onclick="selectRole('user')">User</button>
<button onclick="selectRole('ngo')">NGO</button>
<button onclick="selectRole('delivery')">Delivery</button>
</div>

<div id="registrationForm" style="display:none;">
<h3 id="formTitle"></h3>

<div id="userFields">
<input id="name" placeholder="Name">
<input id="phone" placeholder="10-digit phone">
<input id="age" placeholder="Age">
</div>

<button onclick="submitDetails()">Continue</button>
</div>

<div id="mainApp" style="display:none;">

<h2 id="welcomeText"></h2>

<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px;">

<input id="foodName" placeholder="Food Name">
<input id="location" placeholder="Enter Location">
<input id="quantity" type="number" min="1" placeholder="Quantity">

<select id="unit">
<option>kg</option>
<option>g</option>
<option>pieces</option>
<option>plates</option>
<option>L</option>
<option>mL</option>
</select>
<button onclick="startCamera()">Start Camera</button>
<button onclick="captureImage()">📸 Capture Image</button>
<button onclick="stopCamera()">Stop Camera</button>

</div>

<video id="video" autoplay playsinline style="width:320px;display:block;margin:15px auto;border-radius:10px;"></video>
<img id="preview">

<p id="status"></p>

<div style="margin-top:15px;">
<button onclick="addFood()">Add Food</button>
<button onclick="openNGOPopup()">Send to NGO</button>
<button onclick="findDelivery()">Find Delivery</button>
</div>

<div id="foodList"></div>
<div id="deliveryResult" style="margin-top:10px;font-weight:bold;"></div>
<div id="result"></div>
</div>

<script src="script.js"></script>
<!-- CHAT ICON -->
<div id="chatIcon" onclick="toggleChat()" style="position:fixed;bottom:20px;right:20px;background:#2e7d32;color:white;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:999;">
🍎
</div>

<!-- CHAT BOX -->
<div id="chatBox" style="display:none;position:fixed;bottom:90px;right:20px;width:300px;background:white;border-radius:12px;box-shadow:0 0 15px rgba(0,0,0,0.3);z-index:999;">

<div style="background:#2e7d32;color:white;padding:10px;border-radius:12px 12px 0 0;">
ECOEATS AI
<span onclick="toggleChat()" style="float:right;cursor:pointer;">✖</span>
</div>

<div id="chatMessages" style="height:200px;overflow-y:auto;padding:10px;font-size:14px;">
<p>👋 Hi, I’m ECOEATS AI 🍎  
I help you donate food smartly.</p>
</div>

<div style="display:flex;">
<input id="chatInput" placeholder="Type..." style="flex:1;padding:8px;border:none;">
<button onclick="sendMessage()">➤</button>
</div>

</div>
</body>
</html>
